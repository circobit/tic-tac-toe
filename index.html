<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="./css/style.css" rel="stylesheet"></link>
	<script src="./js/script.js" defer></script>
	<title>Tic-Tac-Toe</title>
</head>
<body>
	<div class="container">

		<div class="title">Tic-Tac-Toe</div>

		<button class="resetGame">Reset Game</button>

		<div class="gameboard">
			<div class="cell" data-col="0" id="cell1"></div>
			<div class="cell" data-col="1" id="cell2"></div>
			<div class="cell" data-col="2" id="cell3"></div>
			<div class="cell" data-col="0" id="cell4"></div>
			<div class="cell" data-col="1" id="cell5"></div>
			<div class="cell" data-col="2" id="cell6"></div>
			<div class="cell" data-col="0" id="cell7"></div>
			<div class="cell" data-col="1" id="cell8"></div>
			<div class="cell" data-col="2" id="cell9"></div>
		</div>

		<div class="roundResult">
			<div class="roundResultTitle">ROUND RESULT</div>
			<div class="roundResultValue"></div>
		</div>

		<div class="scoreBoard">
			<div class="scoreTitleContainer">
				<div class="scoreTitle">SCORE</div>
			</div>

			<div class="playersPoints">
				<div class="player" id="player1">
					<span id="player1Name">Player 1 </span>
					<span id="player1Score">0</span>
					<button class="changeName">Edit Name</button>
				</div>
				<div class="player" id="player2">
					<span id="player2Name">Player 2 </span>
					<span id="player2Score">0</span>
					<button class="changeName">Edit Name</button>
				</div>
			</div>
		</div>

	</div>
</body>
</html>
