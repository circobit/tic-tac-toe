<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="./css/style.css" rel="stylesheet"></link>
	<script src="./js/script.js"></script>
	<title>Tic-Tac-Toe</title>
</head>
<body>
	<div class="container">

		<div class="title">Tic-Tac-Toe</div>

		<div class="resetGame">Reset Game</div>

		<div class="gameboard">
			<div class="row" data-row="0">
				<div class="cell" data-col="0"></div>
				<div class="cell" data-col="1"></div>
				<div class="cell" data-col="2"></div>
			</div>
			<div class="row" data-row="1">
				<div class="cell" data-col="0"></div>
				<div class="cell" data-col="1"></div>
				<div class="cell" data-col="2"></div>
			</div>
			<div class="row" data-row="2">
				<div class="cell" data-col="0"></div>
				<div class="cell" data-col="1"></div>
				<div class="cell" data-col="2"></div>
			</div>
		</div>

		<div class="score">
			<div class="scoreTitle">SCORE</div>
			<div id="player1"><span id="player1Name">Player 1</span><span id="player1Score">0</span></div>
			<div id="player2"><span id="player2Name">Player 2</span><span id="player2Score">0</span></div>
		</div>

		<div class="roundResult"></div>

	</div>
</body>
</html>
